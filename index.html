<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charity Ticker</title>
<style>
  @font-face {
    font-family: 'FSSinclair';
    src: url('https://cdn.jsdelivr.net/gh/adeafblindman/Heros2026@main/FSSinclair-Medium.otf') format('opentype');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg-color: transparent;
    --bar-color: #2ecc71;
    --bar-track-color: rgba(255,255,255,0.15);
    --text-color: #ffffff;
    --accent-color: #ffcc00;
    --sub-text-color: rgba(255,255,255,0.75);
    --font-family: 'FSSinclair', 'Segoe UI', Arial, sans-serif;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-color);
    font-family: var(--font-family);
    color: var(--text-color);
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  #ticker-root {
    box-sizing: border-box;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: flex-end; /* default: bar sits at the bottom */
    justify-content: center;
    padding: 12px 20px;
  }

  #ticker-root.pos-top {
    align-items: flex-start;
  }

  #ticker-root.pos-center {
    align-items: center;
  }

  #ticker-root.pos-bottom {
    align-items: flex-end;
  }

  .panel {
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .panel.active {
    display: flex;
    opacity: 1;
  }

  .panel-title {
    font-size: clamp(14px, 2.4vh, 22px);
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--accent-color);
    margin: 0 0 2px 0;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }

  /* ---------- Bar 1: Total Raised ---------- */
  .total-amount {
    font-size: clamp(28px, 6vh, 56px);
    font-weight: 800;
    line-height: 1;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }

  .total-amount .label {
    font-size: clamp(13px, 2vh, 20px);
    font-weight: 500;
    color: var(--sub-text-color);
    margin-left: 8px;
  }

  .progress-track {
    width: 100%;
    height: clamp(14px, 3vh, 28px);
    background: var(--bar-track-color);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
  }

  .progress-fill {
    height: 100%;
    background: var(--bar-color);
    border-radius: 999px;
    transition: width 1s ease-out;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    box-shadow: 0 0 8px var(--bar-color);
  }

  .progress-pct {
    font-size: clamp(11px, 1.8vh, 16px);
    font-weight: 700;
    color: #fff;
    padding-right: 8px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    white-space: nowrap;
  }

  /* ---------- Single-entry display (fundraisers / campaigns / donors) ---------- */
  .single-entry-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: clamp(6px, 1.4vh, 14px);
  }

  .single-entry {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    opacity: 1;
    transition: opacity 0.35s ease;
  }

  .single-entry.swapping {
    opacity: 0;
  }

  .single-entry .rank {
    font-weight: 800;
    color: var(--accent-color);
    font-size: clamp(16px, 3vh, 26px);
    min-width: 1.4em;
    text-align: right;
    flex-shrink: 0;
  }

  .single-entry .avatar {
    width: clamp(32px, 6vh, 56px);
    height: clamp(32px, 6vh, 56px);
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--accent-color);
    flex-shrink: 0;
    background: rgba(255,255,255,0.1);
  }

  .single-entry .name-block {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }

  .single-entry .primary-name {
    font-size: clamp(16px, 3vh, 28px);
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }

  .single-entry .secondary-name {
    font-size: clamp(12px, 2vh, 17px);
    color: var(--sub-text-color);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .single-entry .amount {
    font-size: clamp(18px, 3.4vh, 30px);
    font-weight: 800;
    color: var(--bar-color);
    white-space: nowrap;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    flex-shrink: 0;
    margin-left: auto;
  }

  .entry-dots {
    display: flex;
    gap: 6px;
    margin-top: 2px;
  }

  .entry-dots .dot {
    width: clamp(5px, 0.9vh, 8px);
    height: clamp(5px, 0.9vh, 8px);
    border-radius: 50%;
    background: var(--bar-track-color);
    transition: background 0.3s ease;
  }

  .entry-dots .dot.active {
    background: var(--accent-color);
  }

  /* ---------- Status / error state ---------- */
  #status-msg {
    font-size: clamp(12px, 1.8vh, 16px);
    color: var(--sub-text-color);
    text-align: center;
  }

  #status-msg.error {
    color: #ff6b6b;
  }
</style>
</head>
<body>

<div id="ticker-root">
  <div id="status-msg">Loading…</div>

  <!-- Panel 1: Total Raised -->
  <div class="panel" id="panel-total">
    <div class="panel-title" id="title-total">Total Raised</div>
    <div class="total-amount">
      <span id="total-amount-value">$0.00</span>
      <span class="label" id="total-amount-label">raised so far</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%">
        <span class="progress-pct" id="progress-pct-text">0%</span>
      </div>
    </div>
  </div>

  <!-- Panel 2: Top Fundraisers -->
  <div class="panel" id="panel-fundraisers">
    <div class="panel-title" id="title-fundraisers">Top Fundraisers</div>
    <div class="single-entry-wrap" id="entry-fundraisers"></div>
  </div>

  <!-- Panel 3: Supporting Campaigns -->
  <div class="panel" id="panel-campaigns">
    <div class="panel-title" id="title-campaigns">Supporting Campaigns</div>
    <div class="single-entry-wrap" id="entry-campaigns"></div>
  </div>

  <!-- Panel 4: Top Donors -->
  <div class="panel" id="panel-donors">
    <div class="panel-title" id="title-donors">Top Donors</div>
    <div class="single-entry-wrap" id="entry-donors"></div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ----------------------------------------------------------------------
  // CONFIG: read from URL parameters
  // ----------------------------------------------------------------------
  // Example:
  //   ?bg=transparent&bar=00ff88&text=ffffff&accent=ffcc00&track=ffffff33
  //   &w=800&h=200&rotate=8&entry=5&refresh=30&maxitems=5&position=bottom
  //   &title_total=Total%20Raised&title_fundraisers=Top%20Fundraisers
  //   &title_campaigns=Campaigns&title_donors=Top%20Donors
  //   &label_total=raised%20so%20far
  //   &api=https://hd2clans.com/api/public/heroes26
  //   &panels=total,fundraisers,campaigns,donors

  const params = new URLSearchParams(window.location.search);

  function getColor(name, fallback) {
    let v = params.get(name);
    if (!v) return fallback;
    v = v.trim();
    // Allow passing hex without '#' since '#' needs URL-encoding otherwise
    if (/^[0-9a-fA-F]{3,8}$/.test(v)) v = '#' + v;
    return v;
  }

  function getText(name, fallback) {
    const v = params.get(name);
    return (v === null || v === '') ? fallback : v;
  }

  function getNum(name, fallback) {
    const v = parseFloat(params.get(name));
    return isNaN(v) ? fallback : v;
  }

  const CONFIG = {
    bg: getColor('bg', 'transparent'),
    barColor: getColor('bar', '#2ecc71'),
    trackColor: getColor('track', 'rgba(255,255,255,0.15)'),
    textColor: getColor('text', '#ffffff'),
    accentColor: getColor('accent', '#ffcc00'),
    subTextColor: getColor('subtext', 'rgba(255,255,255,0.75)'),
    fontFamily: getText('font', "'FSSinclair', 'Segoe UI', Arial, sans-serif"),

    width: params.get('w'),   // px, optional — forces fixed widget size
    height: params.get('h'),  // px, optional

    rotateSeconds: getNum('rotate', 8),     // dwell time for non-list panels (e.g. total raised)
    entrySeconds: getNum('entry', 5),       // dwell time per entry within list panels
    refreshSeconds: getNum('refresh', 30),  // how often to refetch the API
    maxItems: Math.max(1, Math.floor(getNum('maxitems', 5))),

    apiUrl: getText('api', 'https://hd2clans.com/api/public/heroes26'),

    // Where the bar sits vertically in the page: 'top', 'center', or 'bottom'
    position: (() => {
      const v = (getText('position', 'bottom') || 'bottom').toLowerCase();
      return ['top', 'center', 'bottom'].includes(v) ? v : 'bottom';
    })(),

    titles: {
      total: getText('title_total', 'Total Raised'),
      fundraisers: getText('title_fundraisers', 'Top Fundraisers'),
      campaigns: getText('title_campaigns', 'Supporting Campaigns'),
      donors: getText('title_donors', 'Top Donors')
    },
    totalLabel: getText('label_total', 'raised so far'),

    // Which panels to include & their order, e.g. ?panels=total,donors
    panelOrder: getText('panels', 'total,fundraisers,campaigns,donors')
      .split(',').map(s => s.trim()).filter(Boolean)
  };

  // ----------------------------------------------------------------------
  // APPLY CONFIG: colors, fonts, size
  // ----------------------------------------------------------------------
  const root = document.documentElement;
  root.style.setProperty('--bg-color', CONFIG.bg);
  root.style.setProperty('--bar-color', CONFIG.barColor);
  root.style.setProperty('--bar-track-color', CONFIG.trackColor);
  root.style.setProperty('--text-color', CONFIG.textColor);
  root.style.setProperty('--accent-color', CONFIG.accentColor);
  root.style.setProperty('--sub-text-color', CONFIG.subTextColor);
  root.style.setProperty('--font-family', CONFIG.fontFamily);

  document.getElementById('ticker-root').classList.add('pos-' + CONFIG.position);

  if (CONFIG.width) {
    document.body.style.width = CONFIG.width + 'px';
    document.getElementById('ticker-root').style.width = CONFIG.width + 'px';
  }
  if (CONFIG.height) {
    document.body.style.height = CONFIG.height + 'px';
    document.getElementById('ticker-root').style.height = CONFIG.height + 'px';
  }

  document.getElementById('title-total').textContent = CONFIG.titles.total;
  document.getElementById('title-fundraisers').textContent = CONFIG.titles.fundraisers;
  document.getElementById('title-campaigns').textContent = CONFIG.titles.campaigns;
  document.getElementById('title-donors').textContent = CONFIG.titles.donors;
  document.getElementById('total-amount-label').textContent = CONFIG.totalLabel;

  // ----------------------------------------------------------------------
  // HELPERS
  // ----------------------------------------------------------------------
  function formatCurrency(value) {
    const num = parseFloat(value);
    if (isNaN(num)) return '$0';
    return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  const FALLBACK_AVATAR = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">' +
    '<rect width="100" height="100" fill="#888"/>' +
    '<circle cx="50" cy="38" r="20" fill="#ccc"/>' +
    '<rect x="20" y="62" width="60" height="30" rx="15" fill="#ccc"/>' +
    '</svg>'
  );

  function renderSingleEntry(container, items, idx, opts) {
    if (!items.length) {
      container.innerHTML = '';
      return;
    }
    const item = items[idx % items.length];

    let avatarHtml = '';
    if (opts.showAvatar) {
      avatarHtml = `<img class="avatar" src="${escapeHtml(item.avatarSrc || FALLBACK_AVATAR)}" alt=""
        onerror="this.onerror=null;this.src='${FALLBACK_AVATAR}'">`;
    }

    const dotsHtml = items.length > 1
      ? `<div class="entry-dots">${items.slice(0, CONFIG.maxItems).map((_, i) =>
          `<span class="dot${i === idx ? ' active' : ''}"></span>`).join('')}</div>`
      : '';

    container.innerHTML = `
      <div class="single-entry" id="${container.id}-entry">
        <span class="rank">${idx + 1}.</span>
        ${avatarHtml}
        <span class="name-block">
          <span class="primary-name">${escapeHtml(item.primary)}</span>
          ${item.secondary ? `<span class="secondary-name">${escapeHtml(item.secondary)}</span>` : ''}
        </span>
        <span class="amount">${formatCurrency(item.amount)}</span>
      </div>
      ${dotsHtml}
    `;
  }

  // ----------------------------------------------------------------------
  // RENDER FUNCTIONS PER PANEL
  // ----------------------------------------------------------------------
  // Holds the latest items array for each list-type panel, plus which
  // entry index is currently displayed.
  const PANEL_DATA = {
    fundraisers: { items: [], showAvatar: true, containerId: 'entry-fundraisers' },
    campaigns: { items: [], showAvatar: true, containerId: 'entry-campaigns' },
    donors: { items: [], showAvatar: true, containerId: 'entry-donors' }
  };

  function renderTotal(data) {
    const raised = data.total_raised != null ? data.total_raised : 0;
    const pct = data.pct != null ? data.pct : 0;
    document.getElementById('total-amount-value').textContent = formatCurrency(raised);
    const fill = document.getElementById('progress-fill');
    const pctClamped = Math.max(0, Math.min(100, pct));
    fill.style.width = pctClamped + '%';
    document.getElementById('progress-pct-text').textContent = pct.toFixed
      ? pct.toFixed(1) + '%'
      : pct + '%';
  }

  function renderFundraisers(data) {
    PANEL_DATA.fundraisers.items = (data.fundraisers || []).map(f => ({
      primary: f.name,
      secondary: '',
      amount: f.amount ? f.amount.value : 0,
      avatarSrc: f.avatar ? f.avatar.src : null
    })).slice(0, CONFIG.maxItems);
  }

  function renderCampaigns(data) {
    PANEL_DATA.campaigns.items = (data.supporting_campaigns || []).map(c => ({
      primary: c.campaign_name || c.v || 'Campaign',
      secondary: c.user_name ? ('by ' + c.user_name) : '',
      amount: c.amount_raised || 0,
      avatarSrc: c.user_avatar_url || null
    })).slice(0, CONFIG.maxItems);
  }

  function renderDonors(data) {
    PANEL_DATA.donors.items = (data.top_donors || []).map(d => ({
      primary: d.name,
      secondary: '',
      amount: d.amount ? d.amount.value : 0,
      avatarSrc: d.avatar ? d.avatar.src : null
    })).slice(0, CONFIG.maxItems);
  }

  const RENDERERS = {
    total: renderTotal,
    fundraisers: renderFundraisers,
    campaigns: renderCampaigns,
    donors: renderDonors
  };

  const PANEL_IDS = {
    total: 'panel-total',
    fundraisers: 'panel-fundraisers',
    campaigns: 'panel-campaigns',
    donors: 'panel-donors'
  };

  // ----------------------------------------------------------------------
  // ROTATION
  // ----------------------------------------------------------------------
  let activePanels = CONFIG.panelOrder.filter(p => PANEL_IDS[p]);
  if (activePanels.length === 0) activePanels = ['total', 'fundraisers', 'campaigns', 'donors'];

  let currentPanelIndex = 0;
  let currentEntryIndex = 0;
  let stepTimer = null;

  function showPanel(panelKey) {
    Object.values(PANEL_IDS).forEach(id => {
      document.getElementById(id).classList.remove('active');
    });
    const el = document.getElementById(PANEL_IDS[panelKey]);
    if (el) el.classList.add('active');
  }

  // Draws the current entry for a list-type panel (fundraisers/campaigns/donors).
  function drawCurrentEntry(panelKey) {
    const pdata = PANEL_DATA[panelKey];
    if (!pdata) return;
    const container = document.getElementById(pdata.containerId);
    if (!container) return;
    renderSingleEntry(container, pdata.items, currentEntryIndex, { showAvatar: pdata.showAvatar });
  }

  // Advances the ticker by one "step" — either the next entry within the
  // current list panel, or the next panel entirely.
  function advanceStep() {
    const panelKey = activePanels[currentPanelIndex];
    const pdata = PANEL_DATA[panelKey];
    const isListPanel = !!pdata;

    if (isListPanel && pdata.items.length > 1 && currentEntryIndex < pdata.items.length - 1) {
      // More entries left in this panel — show the next one.
      currentEntryIndex++;
      drawCurrentEntry(panelKey);
      scheduleNextStep(CONFIG.entrySeconds);
      return;
    }

    // Either a non-list panel (e.g. total) or we've shown the last entry —
    // move on to the next panel.
    currentPanelIndex = (currentPanelIndex + 1) % activePanels.length;
    currentEntryIndex = 0;
    enterPanel(currentPanelIndex);
  }

  function enterPanel(index) {
    const panelKey = activePanels[index];
    showPanel(panelKey);

    const pdata = PANEL_DATA[panelKey];
    if (pdata) {
      currentEntryIndex = 0;
      drawCurrentEntry(panelKey);
      // If a list panel has no items at all, don't get stuck — move on
      // after the normal dwell time anyway.
      scheduleNextStep(CONFIG.entrySeconds);
    } else {
      // Simple panel (total raised) — dwell for the full panel duration.
      scheduleNextStep(CONFIG.rotateSeconds);
    }
  }

  function scheduleNextStep(seconds) {
    if (stepTimer) clearTimeout(stepTimer);
    stepTimer = setTimeout(advanceStep, Math.max(1, seconds) * 1000);
  }

  function startRotation() {
    currentPanelIndex = 0;
    currentEntryIndex = 0;
    enterPanel(currentPanelIndex);
  }

  // Re-renders whatever is currently on screen after a fresh data fetch,
  // without resetting position/timers (keeps the ticker feeling continuous).
  function refreshCurrentView() {
    const panelKey = activePanels[currentPanelIndex];
    const pdata = PANEL_DATA[panelKey];
    if (pdata) {
      // Clamp entry index in case the new data has fewer items.
      if (currentEntryIndex >= pdata.items.length) currentEntryIndex = 0;
      drawCurrentEntry(panelKey);
    }
  }

  // ----------------------------------------------------------------------
  // DATA FETCHING
  // ----------------------------------------------------------------------
  let hasLoadedOnce = false;

  async function fetchData() {
    try {
      const res = await fetch(CONFIG.apiUrl, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const raw = await res.json();
      // The live API nests all the actual fields under "tiltify".
      // Fall back to the raw payload itself in case the shape ever
      // changes back to a flat structure.
      const data = (raw && raw.tiltify) ? raw.tiltify : raw;

      activePanels.forEach(key => {
        if (RENDERERS[key]) RENDERERS[key](data);
      });

      const statusEl = document.getElementById('status-msg');
      if (statusEl) statusEl.remove();

      if (!hasLoadedOnce) {
        hasLoadedOnce = true;
        startRotation();
      } else {
        refreshCurrentView();
      }
    } catch (err) {
      console.error('Charity ticker fetch failed:', err);
      if (!hasLoadedOnce) {
        const statusEl = document.getElementById('status-msg');
        if (statusEl) {
          statusEl.textContent = 'Unable to load data (' + err.message + '). Check console / CORS.';
          statusEl.classList.add('error');
        }
      }
      // If it already loaded once successfully, just keep showing stale data
      // and silently retry on the next refresh cycle.
    }
  }

  fetchData();
  setInterval(fetchData, Math.max(5, CONFIG.refreshSeconds) * 1000);

})();
</script>

</body>
</html>
